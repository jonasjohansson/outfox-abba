[Global]
FallbackTheme=_fallback
FirstAttractScreen="ScreenDemonstration"

[Common]
ThemeName=ABBA Dance Experience

# --- Kiosk: Title menu only shows "Play" ---
[ScreenTitleMenu]
ChoiceNames="GameStart"
TimerSeconds=10

# --- Kiosk: Song select auto-starts after timeout ---
[ScreenSelectMusic]
MusicWheelUsesSections=Never
TimerSeconds=30

# --- Kiosk: Skip difficulty select quickly ---
[ScreenSelectDifficulty]
TimerSeconds=3

# --- Kiosk: Skip player options quickly ---
[ScreenPlayerOptions]
TimerSeconds=2

# --- Kiosk: Skip stage info screen fast ---
[ScreenStageInformation]
TimerSeconds=1

# --- Kiosk: Results screen auto-advances ---
[ScreenEvaluation]
TimerSeconds=15

# --- Kiosk: Game over returns to title quickly ---
[ScreenGameOver]
TimerSeconds=5

[ScreenGameplay]
# Gameplay screen settings

# --- Attract mode: auto-play song demos ---
[ScreenDemonstration]
SecondsToShow=30
DifficultiesToShow="easy,medium"
