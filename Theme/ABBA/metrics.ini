[Global]
FallbackTheme=_fallback

[Common]
ThemeName=ABBA Dance Experience

# --- Kiosk: Title menu only shows "Play" ---
[ScreenTitleMenu]
ChoiceNames="GameStart"
TimerSeconds=10

# --- Kiosk: Song select auto-starts after timeout ---
[ScreenSelectMusic]
MusicWheelUsesSections=Never
TimerSeconds=30

# --- Kiosk: Skip difficulty select, use default ---
[ScreenSelectDifficulty]
TimerSeconds=10

# --- Kiosk: Skip player options ---
[ScreenPlayerOptions]
TimerSeconds=5

# --- Kiosk: Results screen auto-advances ---
[ScreenEvaluation]
TimerSeconds=15

# --- Kiosk: Game over returns to title quickly ---
[ScreenGameOver]
TimerSeconds=5

